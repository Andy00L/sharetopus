version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js
  - React
  - Tailwind CSS
  - Radix UI
  - shadcn/ui
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Marketing landing page for Sharetopus
  - path: /pricing
    file: app/pricing/page.tsx
    auth_required: false
    description: Pricing and plan comparison page
  - path: /login
    file: app/(auth)/sign-in/[[...sign-in]]/page.tsx
    auth_required: false
    description: Authentication entry using Clerk for sign in
  - path: /dashboard
    file: app/(app)/dashboard/page.tsx
    auth_required: true
    description: Main logged-in dashboard overview
  - path: /accounts
    file: app/(app)/accounts/page.tsx
    auth_required: true
    description: Connected social accounts management
  - path: /scheduled
    file: app/(app)/scheduled/page.tsx
    auth_required: true
    description: Scheduled posts list and calendar
  - path: /history
    file: app/(app)/history/page.tsx
    auth_required: true
    description: Published content history and performance
  - path: /settings
    file: app/(app)/settings/page.tsx
    auth_required: true
    description: Workspace and billing settings
features:
  - name: Marketing Website
    description: Public marketing site with landing, pricing, and legal pages
    files:
      - app/page.tsx
      - app/pricing/page.tsx
      - app/(marketing)/privacy/page.tsx
      - app/(marketing)/terms/page.tsx
    entry_route: /
    user_interactions:
      - Scroll landing page sections
      - Click call-to-action buttons to go to signup or login
      - Navigate to pricing page
      - Open and read privacy policy
      - Open and read terms of service
    api_calls: []
    auth_required: false
  - name: Authentication with Clerk
    description: User sign in and sign up using Clerk-hosted UI
    files:
      - app/(auth)/sign-in/[[...sign-in]]/page.tsx
      - app/(auth)/sign-up/[[...sign-up]]/page.tsx
      - src/middleware.ts
    entry_route: /login
    user_interactions:
      - Open login page from landing
      - Enter email and password
      - Complete OAuth provider login where available
      - Log out from the application
    api_calls:
      - method: POST
        endpoint: /v1/client/sessions
    auth_required: false
  - name: Connected Social Accounts Management
    description: Connect and manage Pinterest and LinkedIn accounts
    files:
      - app/(app)/accounts/page.tsx
      - src/lib/integrations/pinterest.ts
      - src/lib/integrations/linkedin.ts
    entry_route: /accounts
    user_interactions:
      - Open connected accounts page
      - Start OAuth connection flow for Pinterest
      - Start OAuth connection flow for LinkedIn
      - Disconnect an existing social account
    api_calls:
      - method: GET
        endpoint: /api/accounts
      - method: POST
        endpoint: /api/accounts/connect
      - method: POST
        endpoint: /api/accounts/disconnect
    auth_required: true
  - name: Subscription and Billing with Stripe
    description: Manage paid subscription via Stripe checkout and customer portal
    files:
      - app/(app)/settings/billing/page.tsx
      - app/api/stripe/checkout/route.ts
      - app/api/stripe/portal/route.ts
    entry_route: /settings
    user_interactions:
      - Open billing settings
      - Click upgrade or change plan button
      - Complete Stripe checkout in hosted pages
      - Open Stripe customer portal for managing subscription
    api_calls:
      - method: POST
        endpoint: /api/stripe/checkout
      - method: POST
        endpoint: /api/stripe/portal
    auth_required: true
  - name: Post Creation and Scheduling
    description: Create, schedule, and edit text, image, and video posts
    files:
      - app/(app)/scheduled/page.tsx
      - src/components/core/scheduled/BatchedPostCard.tsx
      - src/components/core/scheduled/PostComposer.tsx
    entry_route: /scheduled
    user_interactions:
      - Open scheduled posts page
      - Select target social accounts for a post
      - Enter post text content
      - Upload images and videos as media
      - Choose future date and time and schedule post
      - Edit an existing scheduled post
      - Cancel a scheduled post
    api_calls:
      - method: GET
        endpoint: /api/posts/scheduled
      - method: POST
        endpoint: /api/posts
      - method: PATCH
        endpoint: /api/posts/{id}
      - method: DELETE
        endpoint: /api/posts/{id}
    auth_required: true
  - name: Content History
    description: View previously published content and basic analytics
    files:
      - app/(app)/history/page.tsx
      - src/components/core/history/HistoryTable.tsx
    entry_route: /history
    user_interactions:
      - Open history page
      - Filter or search past posts
      - Inspect per-post status and metadata
    api_calls:
      - method: GET
        endpoint: /api/posts/history
    auth_required: true
known_limitations:
  - issue: Some API endpoint paths in this summary are inferred and may not exactly match implementation
    location: testsprite_tests/tmp/code_summary.yaml
    impact: Tests relying on inferred endpoints may require adjustment to match real routes
